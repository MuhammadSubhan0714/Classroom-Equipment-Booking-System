<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Equipment Booking System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        .status-available { background: linear-gradient(135deg, #10b981, #059669); }
        .status-booked { background: linear-gradient(135deg, #ef4444, #dc2626); }
        .fade-in { animation: fadeIn 0.5s ease-in; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .qr-container { backdrop-filter: blur(10px); }
    </style>
</head>

<body class="bg-gradient-to-br from-indigo-50 via-white to-blue-50 min-h-screen">

<!-- HEADER -->
<header class="bg-white/80 backdrop-blur-md shadow-lg sticky top-0 z-50 border-b border-indigo-100">
    <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold text-indigo-600">Equipment Booking</h1>
        <span id="userName">Welcome, Student</span>
    </div>
</header>

<div class="max-w-7xl mx-auto p-6">

<!-- STATS -->
<div class="grid grid-cols-3 gap-4 mb-6">
    <div>Available: <span id="availableCount">0</span></div>
    <div>Booked: <span id="bookedCount">0</span></div>
    <div>Total: <span id="totalBookings">0</span></div>
</div>

<!-- EQUIPMENT -->
<div id="equipmentList" class="grid grid-cols-3 gap-4"></div>

<!-- QUICK BOOK -->
<div class="mt-6">
    <h3>Select Equipment</h3>
    <div id="selectedEquipment" class="hidden">
        <h4 id="selectedName"></h4>
        <p id="selectedStatus"></p>
    </div>

    <div id="timeSlots" class="grid grid-cols-4 gap-2 mt-3"></div>

    <button id="bookBtn" disabled class="mt-3 bg-indigo-500 text-white p-2">Book</button>
</div>

<!-- QR -->
<div id="qrSection" class="hidden mt-4">
    <canvas id="qrcode"></canvas>
    <p id="bookingId"></p>
</div>

<!-- ADMIN -->
<div class="mt-6">
    <h3>Admin Bookings</h3>
    <div id="adminBookings"></div>
</div>

</div>

<script>
const equipmentData = [
    { id:1,name:"Projector 201",status:"available",location:"Room A-101"},
    { id:2,name:"Projector 202",status:"booked",location:"Room B-205"},
    { id:3,name:"Laptop Cart",status:"available",location:"IT Office"}
];

let currentBookings = [];
let selectedEquipment = null;
let selectedTimeSlot = null;

// RANDOM SLOTS
function generateTimeSlots(){
    const slots=[];
    for(let i=10;i<18;i++){
        slots.push(`${i}:00-${i+1}:00`);
    }
    return slots.sort(()=>Math.random()-0.5);
}

// INIT
document.addEventListener('DOMContentLoaded',()=>{
    renderEquipment();
    renderTimeSlots();
    updateStats();
});

// EQUIPMENT
function renderEquipment(){
    const container=document.getElementById('equipmentList');
    container.innerHTML="";

    equipmentData.forEach(eq=>{
        const div=document.createElement('div');
        div.className = eq.status==="available" ? "bg-green-400 p-4" : "bg-red-400 p-4";
        div.innerHTML = `<h4>${eq.name}</h4><p>${eq.location}</p>`;
        div.onclick=()=>selectEquipment(eq);
        container.appendChild(div);
    });
}

// SELECT
function selectEquipment(eq){
    selectedEquipment=eq;

    document.getElementById('selectedEquipment').classList.remove('hidden');
    document.getElementById('selectedName').textContent=eq.name;
    document.getElementById('selectedStatus').textContent=eq.status;

    document.getElementById('bookBtn').disabled = eq.status!=="available";
}

// TIME SLOTS
function renderTimeSlots(){
    const container=document.getElementById('timeSlots');
    container.innerHTML="";
    const slots=generateTimeSlots();

    slots.forEach(slot=>{
        const btn=document.createElement('button');
        btn.textContent=slot;
        btn.onclick=()=>{
            selectedTimeSlot=slot;
        };
        container.appendChild(btn);
    });
}

// BOOK
function bookEquipment(){
    if(!selectedEquipment||!selectedTimeSlot) return;

    const booking={
        id:"BK"+Math.floor(Math.random()*10000),
        name:selectedEquipment.name,
        time:selectedTimeSlot
    };

    currentBookings.push(booking);

    selectedEquipment.status="booked";

    QRCode.toCanvas(document.getElementById('qrcode'), booking.id);

    document.getElementById('bookingId').textContent=booking.id;
    document.getElementById('qrSection').classList.remove('hidden');

    updateStats();
    updateAdmin();
    renderEquipment();
}

document.getElementById('bookBtn').onclick=bookEquipment;

// ADMIN
function updateAdmin(){
    const div=document.getElementById('adminBookings');
    div.innerHTML="";
    currentBookings.forEach(b=>{
        div.innerHTML+=`<p>${b.name} - ${b.time}</p>`;
    });
}

// STATS
function updateStats(){
    document.getElementById('availableCount').textContent =
        equipmentData.filter(e=>e.status==="available").length;

    document.getElementById('bookedCount').textContent =
        equipmentData.filter(e=>e.status==="booked").length;

    document.getElementById('totalBookings').textContent =
        currentBookings.length;
}
</script>

</body>
</html>
